<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI DJ Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>AI DJ Prototype</h1>
      <p class="muted">Load song metadata + local audio files, then auto-mix with crossfader automation.</p>

      <section class="card">
        <h2>1) Song Metadata (CSV)</h2>
        <p class="muted">Columns: <code>title,artist,bpm,key,energy,duration_sec</code></p>
        <textarea id="songInput" rows="8"></textarea>
        <div class="row">
          <button id="loadSample">Load Sample</button>
          <button id="generatePlan">Generate Mix Plan</button>
          <button id="exportPlan">Export Plan JSON</button>
        </div>
      </section>

      <section class="card">
        <h2>2) Local Audio Files</h2>
        <p class="muted">Select files from your local <code>songs</code> folder.</p>
        <input id="songFiles" type="file" accept="audio/*" multiple />
        <div id="fileMap" class="muted"></div>
      </section>

      <section class="card">
        <h2>3) Playback</h2>
        <div class="row">
          <label>
            Transition Bars
            <select id="transitionBars">
              <option value="8">8</option>
              <option value="16" selected>16</option>
              <option value="32">32</option>
            </select>
          </label>
          <button id="playAuto">Play Auto Mix</button>
          <button id="stopAll" class="secondary">Stop</button>
        </div>
        <div id="status" class="muted">Idle</div>
      </section>

      <section class="card">
        <h2>4) Mix Plan Output</h2>
        <div id="summary" class="muted"></div>
        <div id="tableWrap"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
